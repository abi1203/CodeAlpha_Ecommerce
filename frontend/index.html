<!DOCTYPE html>
<html>
<head>
  <title>A-Mart - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">🛍 A-Mart</div>

<div class="login-box">
  <h2>Create Account / Login</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="phone" placeholder="+91XXXXXXXXXX">

  <div id="recaptcha-container"></div>

  <button id="sendBtn">Send OTP</button>

  <div id="otpSection" style="display:none;">
      <input type="text" id="otp" placeholder="Enter OTP">
      <button id="verifyBtn">Verify OTP</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjUep348P44CNmHBRv4TGfcb-up5y4E6g",
  authDomain: "a-mart-9f37b.firebaseapp.com",
  projectId: "a-mart-9f37b",
  storageBucket: "a-mart-9f37b.firebasestorage.app",
  messagingSenderId: "619606715581",
  appId: "1:619606715581:web:4ee6013c61739bed935bd4",
  measurementId: "G-307DZQ5R0H"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Recaptcha Setup
window.recaptchaVerifier = new RecaptchaVerifier(
  auth,
  'recaptcha-container',
  {
    size: 'normal'
  }
);

// Send OTP
document.getElementById("sendBtn").addEventListener("click", async () => {
  const phone = document.getElementById("phone").value;

  try {
    const confirmationResult = await signInWithPhoneNumber(
      auth,
      phone,
      window.recaptchaVerifier
    );

    window.confirmationResult = confirmationResult;
    document.getElementById("otpSection").style.display = "block";
    alert("OTP Sent Successfully 📲");
  } catch (error) {
    alert(error.message);
  }
});

// Verify OTP
document.getElementById("verifyBtn").addEventListener("click", async () => {
  const code = document.getElementById("otp").value;

  try {
    const result = await window.confirmationResult.confirm(code);

    localStorage.setItem("userName", document.getElementById("name").value);
    localStorage.setItem("userEmail", document.getElementById("email").value);

    alert("Login Successful 🎉");
    window.location.href = "home.html";
  } catch (error) {
    alert("Invalid OTP ❌");
  }
});

</script>
